server {
        listen "82.165.212.204:443" ssl;
        server_name "chesspuertoricocoffee.com";
        ssl_certificate "/opt/psa/var/certificates/scfdh7ck2437o5b7VYFFkW";
        ssl_certificate_key "/opt/psa/var/certificates/scfdh7ck2437o5b7VYFFkW";
        client_max_body_size 128m;
        access_log "/var/www/vhosts/system/chesspuertoricocoffee.com/logs/proxy_access_ssl_log";
        error_log "/var/www/vhosts/system/chesspuertoricocoffee.com/logs/proxy_error_log";
        location ~ ^/(socket/|play/|watch/|lobby/socket|api/socket|round-next|analysis/socket|challenge) {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header Host chesspuertoricocoffee.com;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto https;
                proxy_read_timeout 86400s;
                proxy_send_timeout 86400s;
                proxy_buffering off;
        }
        location = /robots.txt {
                default_type text/plain;
                return 200 'User-agent: *
Allow: /
Disallow: /api/
Disallow: /inbox
Disallow: /setting
Disallow: /account
Disallow: /login
Disallow: /password

# AEO - Answer Engine Optimization
# Site: Chess Puerto Rico Coffee (chesspuertoricocoffee.com)
# Description: Free online chess server for the USA and Puerto Rico
# Sponsor: PuertoRicoCoffeeShop.com
# Features: Play chess online, tournaments, puzzles, AI opponents, game analysis
# Languages: English, Spanish
# Region: USA, Puerto Rico
# Contact: system@chesspuertoricocoffee.com
# Powered by: Lichess open-source chess platform

User-agent: GPTBot
Allow: /

User-agent: ChatGPT-User
Allow: /

User-agent: Google-Extended
Allow: /

User-agent: Claude-Web
Allow: /

User-agent: ClaudeBot
Allow: /

User-agent: Bingbot
Allow: /

User-agent: PerplexityBot
Allow: /

User-agent: YouBot
Allow: /

User-agent: Applebot-Extended
Allow: /

User-agent: cohere-ai
Allow: /

Sitemap: https://chesspuertoricocoffee.com/sitemap.xml
';
        }
        location = /sitemap.xml {
                alias /var/www/vhosts/chesspuertoricocoffee.com/seo-files/sitemap.xml;
                types { application/xml xml; }
                default_type application/xml;
        }
        # Contact page
        location = /about {
                alias /var/www/vhosts/chesspuertoricocoffee.com/httpdocs/about.html;
                default_type text/html;
        }
        location = /terms-of-service {
                alias /var/www/vhosts/chesspuertoricocoffee.com/httpdocs/terms-of-service.html;
                default_type text/html;
        }
        location = /privacy {
                alias /var/www/vhosts/chesspuertoricocoffee.com/httpdocs/privacy.html;
                default_type text/html;
        }
        location /api/contact {
                proxy_pass http://127.0.0.1:3001;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_buffering off;
        }
        location = /contact-us {
                alias /var/www/vhosts/chesspuertoricocoffee.com/httpdocs/contact-us.html;
                default_type text/html;
        }
        location = /tv {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host chesspuertoricocoffee.com;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_read_timeout 86400s;
                proxy_buffering off;
                proxy_hide_header Link;
                add_header Link '<https://chesspuertoricocoffee.com$uri>; rel="canonical"' always;
                add_header X-Robots-Tag $chess_noindex always;
                include /etc/nginx/snippets/chess-branding.conf;
                proxy_intercept_errors on;
                error_page 404 = /games;
        }
        location / {
                proxy_pass http://127.0.0.1:8080;
                proxy_http_version 1.1;
                proxy_set_header Host chesspuertoricocoffee.com;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_set_header X-Forwarded-Proto https;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_read_timeout 86400s;
                proxy_buffering off;
                proxy_hide_header Link;
                add_header Link '<https://chesspuertoricocoffee.com$uri>; rel="canonical"' always;
                add_header X-Robots-Tag $chess_noindex always;
                include /etc/nginx/snippets/chess-branding.conf;
        }
}
server {
        listen "82.165.212.204:80";
